name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

    # Note: the full `npm run build` runs `prisma migrate deploy` against a live
    # DB, so it's intentionally left to the Vercel deploy (which also type-checks
    # the app). Lint + Vitest catch regressions here without DB/secret access.
