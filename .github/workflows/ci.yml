name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

    # Note: the full `npm run build` runs `prisma migrate deploy` against a live
    # DB, so it's intentionally left to the Vercel deploy (which also type-checks
    # the app). Lint + Vitest catch regressions here without DB/secret access.

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hykrz_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # The suite is designed to pass with NO external service keys — only a DB
      # and an auth secret are required.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hykrz_e2e?schema=public
      AUTH_SECRET: e2e-ci-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build (generates client, migrates DB, builds app)
        run: npm run build

      - name: Seed E2E data
        run: npm run db:seed:e2e

      - name: Run E2E tests
        run: npm run e2e
        env:
          # Build step already migrated; global-setup seeds again idempotently,
          # but we skip it here since the seed step above ran.
          E2E_SKIP_SEED: "1"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
